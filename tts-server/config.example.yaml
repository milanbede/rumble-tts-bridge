rumble:
  api_url: "https://rumble.com/-livestream-api/get-data"
  api_key: "YOUR_RUMBLE_API_KEY"
  poll_interval_seconds: 30

tts:
  voice: "en-US-AriaNeural"
  rate: "+0%"
  volume: "+0%"

server:
  host: "0.0.0.0"
  port: 8080
  spool_dir: "spool"

telegram:
  bot_token: "8913561503:***"  # kept for reference; no longer used by tts-server
  chat_id: "7292599600"

# KITT bot HTTP API — tts-server POSTs TTS audio here instead of calling Telegram directly.
# The KITT bot (kitt/telegram_bot.py) runs long-polling on this port and sends to Telegram.
# This resolves the token-conflict: only the KITT bot process calls the Telegram API.
# Note: tts-server appends /send-audio to this URL — do NOT include it here.
kitt_bot_url: "http://127.0.0.1:8082"

events:
  new_follower: true
  new_subscriber: true
  gifted_sub: true
  live_on: true
  live_off: false
  chat_message: false
  rant: true